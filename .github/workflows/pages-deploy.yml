name: GitHub Pages Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: grant

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Debug environment
        run: |
          echo "NODE_VERSION=$(node -v)"
          echo "NPM_VERSION=$(npm -v)"
          echo "CWD=$(pwd)"
          ls -la

      - name: Install dependencies
        run: npm ci --verbose

      - name: Build
        run: npm run build

      - name: Verify output
        run: |
          echo "=== out directory ==="
          ls -la out/ || echo "out/ not found"
          echo "=== index.html ==="
          cat out/index.html | head -5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4